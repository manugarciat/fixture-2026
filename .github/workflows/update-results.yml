name: Actualizar Resultados Mundial 2026

on:
  schedule:
    - cron: '0 */2 * * *' # Se ejecuta cada 2 horas
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      updated: ${{ steps.commit.outputs.updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python update_results.py

      - name: Commit and push changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/real_results.json public/real_results.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update real match results"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: update-results
    if: needs.update-results.outputs.updated == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
