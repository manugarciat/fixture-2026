<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11182d" />
      <stop offset="100%" stop-color="#0a0f1d" />
    </linearGradient>
    
    <!-- Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Purple Accent Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Gold Gradient for the 26 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="60%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with Border -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="6" />
  
  <!-- Outer Glowing Emerald Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#emeraldGrad)" stroke-width="8" filter="url(#glow)" opacity="0.8" />

  <!-- Stylized Soccer Ball Wireframe (Purple) -->
  <g stroke="url(#purpleGrad)" stroke-width="4" fill="none" opacity="0.65" stroke-linejoin="round" stroke-linecap="round">
    <!-- Center pentagon guidelines -->
    <polygon points="256,176 332,231 303,321 209,321 180,231" />
    
    <!-- Outer connections -->
    <line x1="256" y1="176" x2="256" y2="90" />
    <line x1="332" y1="231" x2="410" y2="206" />
    <line x1="303" y1="321" x2="366" y2="400" />
    <line x1="209" y1="321" x2="146" y2="400" />
    <line x1="180" y1="231" x2="102" y2="206" />

    <!-- Outer ring borders -->
    <circle cx="256" cy="256" r="166" />
  </g>

  <!-- Glowing Gold 26 in the Center -->
  <text 
    x="256" 
    y="335" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="900" 
    font-size="225" 
    fill="url(#goldGrad)" 
    text-anchor="middle" 
    letter-spacing="-4"
    filter="url(#glow)"
  >26</text>
  
</svg>