name: Actualizar Resultados Mundial 2026

on:
  schedule:
    - cron: '0 */2 * * *' # Se ejecuta cada 2 horas
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python update_results.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/real_results.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update real match results" && git push)
